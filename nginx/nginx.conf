events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    client_max_body_size 200M;

    # ── Timeouts for long LLM inference ──────────────────────────────────────
    proxy_read_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ui_limit:10m rate=30r/m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        auth_basic "vLLM Stack — Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ── vLLM OpenAI-compatible API ────────────────────────────────────────
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://vllm:8000/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Streaming support (SSE)
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Management UI ─────────────────────────────────────────────────────
        location / {
            limit_req zone=ui_limit burst=10 nodelay;
            proxy_pass http://model-ui:7860/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
