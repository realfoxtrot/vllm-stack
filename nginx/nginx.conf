events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    client_max_body_size 200M;

    # ── Timeouts for long LLM inference ──────────────────────────────────────
    proxy_read_timeout 600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ui_limit:10m rate=30r/m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Docker internal DNS resolver ──────────────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        auth_basic "vLLM Stack — Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ── vLLM OpenAI-compatible API ────────────────────────────────────────
        location /v1/ {
            auth_basic off;
            limit_req zone=api_limit burst=20 nodelay;
            set $vllm_upstream http://vllm-server:8000;
            proxy_pass $vllm_upstream/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── Management UI internal API (auth_basic off — fetch() не передаёт credentials) ──
        location /api/ {
            auth_basic off;
            limit_req zone=api_limit burst=30 nodelay;
            set $modelui_upstream http://model-ui:7860;
            proxy_pass $modelui_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /apply {
            auth_basic off;
            limit_req zone=api_limit burst=10 nodelay;
            set $modelui_upstream http://model-ui:7860;
            proxy_pass $modelui_upstream/apply;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            auth_basic off;
            set $modelui_upstream http://model-ui:7860;
            proxy_pass $modelui_upstream/health;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── n8n Workflow Automation ───────────────────────────────────────────
        location /n8n/ {
            limit_req zone=ui_limit burst=20 nodelay;
            set $n8n_upstream http://n8n:5678;
            proxy_pass $n8n_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── n8n Webhooks ──────────────────────────────────────────────────────
        location /n8n-webhook/ {
            auth_basic off;
            limit_req zone=api_limit burst=50 nodelay;
            set $n8n_webhook http://n8n:5678;
            proxy_pass $n8n_webhook/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── Management UI ─────────────────────────────────────────────────────
        location / {
            limit_req zone=ui_limit burst=10 nodelay;
            set $modelui_upstream http://model-ui:7860;
            proxy_pass $modelui_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
