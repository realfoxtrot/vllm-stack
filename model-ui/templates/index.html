<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM Control Panel</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #f1f5f9; padding: 2rem; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; color: #94a3b8; letter-spacing: 0.05em; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
        .card h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .status-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
        .badge { padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-gray { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .model-name { font-family: monospace; color: #38bdf8; font-size: 1rem; }
        .chip { display: inline-block; padding: 0.3rem 0.7rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; font-family: monospace; font-size: 0.78rem; margin: 0.2rem; color: #94a3b8; cursor: pointer; }
        .chip:hover { border-color: #3b82f6; color: #f1f5f9; }
        input[type="text"] { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 0.95rem; margin-bottom: 0.75rem; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #3b82f6; }
        .results-box { max-height: 220px; overflow-y: auto; border: 1px solid #334155; border-radius: 8px; margin-bottom: 0.75rem; }
        .result-item { padding: 0.65rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; font-size: 0.88rem; transition: background 0.15s; }
        .result-item:last-child { border-bottom: none; }
        .result-item:hover, .result-item.selected { background: #334155; }
        .result-item .dl-count { color: #64748b; font-size: 0.78rem; }
        button { width: 100%; padding: 0.85rem; border-radius: 8px; border: none; background: #3b82f6; color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover:not(:disabled) { background: #2563eb; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .status-msg { margin-top: 0.75rem; padding: 0.75rem; border-radius: 8px; background: #0f172a; border: 1px solid #334155; font-family: monospace; font-size: 0.85rem; color: #fbbf24; display: none; }
        .vllm-indicator { width: 10px; height: 10px; border-radius: 50%; background: #64748b; display: inline-block; }
        .vllm-indicator.up { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
        .vllm-indicator.down { background: #ef4444; }
        .links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .links a { color: #38bdf8; text-decoration: none; font-size: 0.9rem; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>⚡ vLLM Control Panel</h1>

    <div class="card">
        <h2>Active Model</h2>
        <div class="status-row">
            <span class="vllm-indicator" id="vllm-dot"></span>
            <span class="model-name" id="current-model">{{ current_model }}</span>
            <span class="badge badge-gray" id="deploy-badge">{{ deploy_status }}</span>
        </div>
    </div>

    <div class="card">
        <h2>Cached Models</h2>
        <div>
            {% if local_models %}
                {% for m in local_models %}
                    <span class="chip" onclick="selectModel('{{ m }}')">{{ m }}</span>
                {% endfor %}
            {% else %}
                <span style="color:#64748b;font-size:0.88rem;">No models downloaded yet.</span>
            {% endif %}
        </div>
    </div>

    <div class="card">
        <h2>Deploy Model</h2>
        <input type="text" id="search-input" placeholder="Search HuggingFace (e.g. Qwen2.5, Mistral)..." autocomplete="off">
        <div class="results-box" id="results" style="display:none;"></div>
        <input type="hidden" id="selected-repo">
        <button id="deploy-btn" onclick="deploy()">⬇ Download &amp; Deploy</button>
        <div class="status-msg" id="status-msg"></div>
    </div>

    <div class="card">
        <h2>Quick Links</h2>
        <div class="links">
            <a href="/grafana/" target="_blank">📊 Grafana Dashboards</a>
            <a href="/v1/models" target="_blank">🔌 vLLM Models API</a>
        </div>
    </div>

    <script>
        let searchTimeout = null;
        let pollInterval = null;

        function pollVllmHealth() {
            fetch('/api/vllm/status')
                .then(r => r.json())
                .then(d => {
                    const dot = document.getElementById('vllm-dot');
                    dot.className = 'vllm-indicator ' + (d.healthy ? 'up' : 'down');
                })
                .catch(() => {});
        }
        setInterval(pollVllmHealth, 15000);
        pollVllmHealth();

        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const q = this.value.trim();
            if (!q) { document.getElementById('results').style.display = 'none'; return; }
            searchTimeout = setTimeout(() => searchModels(q), 400);
        });

        async function searchModels(q) {
            const box = document.getElementById('results');
            box.style.display = 'block';
            box.innerHTML = '<div style="padding:1rem;color:#64748b;font-size:0.85rem;">Searching...</div>';
            const res = await fetch('/api/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            if (!data.results.length) {
                box.innerHTML = '<div style="padding:1rem;color:#64748b;font-size:0.85rem;">No results found.</div>';
                return;
            }
            box.innerHTML = data.results.map(m =>
                '<div class="result-item" data-id="' + m.id + '" onclick="selectModel(\'' + m.id + '\')">' +
                '<span>' + m.id + '</span>' +
                '<span class="dl-count">📥 ' + (m.downloads||0).toLocaleString() + '</span>' +
                '</div>'
            ).join('');
        }

        function selectModel(id) {
            document.getElementById('selected-repo').value = id;
            document.getElementById('search-input').value = id;
            document.getElementById('results').style.display = 'none';
        }

        async function deploy() {
            const repo = document.getElementById('selected-repo').value.trim();
            if (!repo) { alert('Please select or type a model repo ID.'); return; }

            const btn = document.getElementById('deploy-btn');
            const msg = document.getElementById('status-msg');
            btn.disabled = true;
            msg.style.display = 'block';
            msg.style.color = '#fbbf24';
            msg.innerText = 'Queuing job...';

            const fd = new FormData();
            fd.append('repo_id', repo);
            fd.append('token', '');

            const res = await fetch('/apply', { method: 'POST', body: fd });
            const data = await res.json();

            pollInterval = setInterval(() => pollJob(data.job_id), 4000);
        }

        async function pollJob(job_id) {
            const data = await fetch('/api/job/' + job_id).then(r => r.json());
            const msg = document.getElementById('status-msg');
            const badge = document.getElementById('deploy-badge');

            badge.innerText = data.deploy_status || data.status;
            msg.innerText = '[' + data.status + '] ' + (data.deploy_status || '');

            if (data.status === 'finished') {
                clearInterval(pollInterval);
                msg.innerText = '✅ Model deployed successfully! Reloading...';
                msg.style.color = '#22c55e';
                setTimeout(() => location.reload(), 2500);
            } else if (data.status === 'failed') {
                clearInterval(pollInterval);
                msg.innerText = '❌ Deploy failed: ' + (data.error || 'unknown error');
                msg.style.color = '#ef4444';
                document.getElementById('deploy-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
